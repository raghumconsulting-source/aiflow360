[build]
  command = "node inject-env.js"
  publish = "."

[build.environment]
  SECRETS_SCAN_ENABLED = "false"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/XPscore360/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self' https://*.supabase.co https://api.anthropic.com https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://*.supabase.co; connect-src 'self' https://*.supabase.co https://api.anthropic.com https://*.netlify.app https://aiflow360.com;"

[[redirects]]
  from = "/xpscore360/*"
  to = "/XPscore360/:splat"
  status = 200
  force = false
