[build]
  base    = ""
  publish = ""
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/api/ai-review"
  to   = "/.netlify/functions/ai-review"
  status = 200